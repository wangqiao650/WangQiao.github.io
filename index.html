<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" type="image/png" href="/123.png" />
    <title>WaQi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #ffffff;
        color: #000000;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #000000;
        color: #ffffff;
      }
      .bullet-point {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: currentColor;
        border-radius: 50%;
        margin-right: 12px;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Modal Animations */
      .modal-enter { opacity: 0; transform: scale(0.95); }
      .modal-enter-active {
        opacity: 1; transform: scale(1);
        transition: opacity 300ms cubic-bezier(0.16, 1, 0.3, 1), transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .modal-exit { opacity: 1; transform: scale(1); }
      .modal-exit-active {
        opacity: 0; transform: scale(0.95);
        transition: opacity 200ms cubic-bezier(0.16, 1, 0.3, 1), transform 200ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .backdrop-enter { opacity: 0; backdrop-filter: blur(0px); }
      .backdrop-enter-active {
        opacity: 1; backdrop-filter: blur(8px);
        transition: opacity 400ms ease, backdrop-filter 400ms ease;
      }
      .backdrop-exit { opacity: 1; backdrop-filter: blur(8px); }
      .backdrop-exit-active {
        opacity: 0; backdrop-filter: blur(0px);
        transition: opacity 300ms ease, backdrop-filter 300ms ease;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
